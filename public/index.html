<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Idea Rescue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>Project Idea Rescue</h1>
            <p class="subtitle">
                Transform rough ideas into complete project plans using AI.
            </p>
        </div>
        <div class="input-section">
            <label for="idea-input">
                Enter your idea or problem statement
            </label>

            <textarea id="idea-input" placeholder="Example: Food Waste Management"></textarea>
            <label for="audience">
                Target Audience
            </label>
            <select id="audience">
                <option value="Students">Students</option>
                <option value="Farmers">Farmers</option>
                <option value="Businesses">Businesses</option>
                <option value="Healthcare">Healthcare</option>
                <option value="Education">Education</option>
                <option value="General Public">General Public</option>
            </select>

            <div class="button-container">
                <button id="generate-btn">Generate Project</button>
            </div>
        </div>
        <div id="output-section">

    <div class="card">
        <h2>Project Title</h2>
        <div id="project-title"></div>
    </div>

    <div class="card">
        <h2>Problem Statement</h2>
        <div id="problem-statement"></div>
    </div>

    <div class="card">
        <h2>Key Features</h2>
        <ul id="features"></ul>
    </div>

    <div class="card">
        <h2>Suggested APIs</h2>
        <ul id="apis"></ul>
    </div>

    <div class="card">
        <h2>Tech Stack</h2>
        <ul id="tech-stack"></ul>
    </div>

    <div class="card">
        <h2>Development Roadmap</h2>
        <ul id="roadmap"></ul>
    </div>

    <div class="card">
        <h2>Resume Description</h2>
        <div id="resume-description"></div>
    </div>

</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
